<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: sans-serif;
      width: 260px;
      padding: 16px;
      margin: 0;
      background: #f0fdf4;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .title {
      font-size: 13px;
      font-weight: 700;
      color: #15803d;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .status {
      font-size: 12px;
      color: #166534;
      background: #dcfce7;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 10px;
    }
    .desc {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:22px">🛡️</span>
    <span class="title">YourAIGuard</span>
  </div>
  <div class="status">✔ Active — monitoring ChatGPT</div>
  <div class="desc">
    Scores every AI response on 7 reasoning-quality criteria and tracks
    reasoning stability across your conversation.<br><br>
    All processing happens entirely on your device using a bundled
    AI model. No data ever leaves your browser.
  </div>
</body>
</html>
