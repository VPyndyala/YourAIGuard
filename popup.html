<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: sans-serif;
      width: 300px;
      padding: 16px;
      margin: 0;
      background: #f0fdf4;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header-title {
      font-size: 13px;
      font-weight: 700;
      color: #15803d;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #166534;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      font-size: 13px;
      box-sizing: border-box;
      outline: none;
      background: white;
    }
    input[type="password"]:focus {
      border-color: #16a34a;
    }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #15803d; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #16a34a;
      min-height: 16px;
    }
    #status.error { color: #dc2626; }
    .hint {
      margin-top: 12px;
      font-size: 11px;
      color: #6b7280;
      line-height: 1.5;
    }
    .saved-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: 12px;
      color: #16a34a;
    }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:20px">🛡️</span>
    <span class="header-title">YourAIGuard</span>
  </div>

  <label for="apiKey">OpenAI API Key</label>
  <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
  <button id="saveBtn">Save Key</button>
  <div id="status"></div>

  <div class="hint">
    Your key is stored locally on your device and never sent anywhere except OpenAI's API.
    Get your key at <strong>platform.openai.com/api-keys</strong>.
  </div>

  <script src="popup.js"></script>
</body>
</html>
